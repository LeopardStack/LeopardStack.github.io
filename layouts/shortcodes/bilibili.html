{{- /* 用法见 content/posts/tech/hello-hugo.md，支持位置参数或 id/page 命名参数 */ -}}
{{- $id := .Get "id" | default (.Get 0) -}}
{{- $page := .Get "page" | default "1" -}}
<div class="bilibili-wrapper" style="position: relative; width: 100%; padding-bottom: 56.25%; margin: 1rem 0;">
  <iframe
    src="https://player.bilibili.com/player.html?bvid={{ $id }}&page={{ $page }}&high_quality=1&danmaku=0&autoplay=0"
    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;"
    scrolling="no"
    frameborder="no"
    allowfullscreen="true"
    loading="lazy">
  </iframe>
</div>
